naftiko: "1.0.0-alpha1"

info:
  label: "Azure Service Bus Management API"
  description: "REST API for managing Azure Service Bus resources including namespaces, queues, topics, and subscriptions through Azure Resource Manager."
  tags:
    - Azure
    - Service Bus
    - Messaging
    - Cloud
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_BEARER_TOKEN: AZURE_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: service-bus
      baseUri: "https://management.azure.com"
      description: "Azure Service Bus Management API"
      authentication:
        type: bearer
        token: "{{AZURE_BEARER_TOKEN}}"
      resources:
        - name: namespaces
          path: /subscriptions/{subscriptionId}/providers/Microsoft.ServiceBus/namespaces
          description: "Service Bus namespaces"
          operations:
            - name: list-namespaces
              method: GET
              description: "List all namespaces in a subscription"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: namespace-details
          path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ServiceBus/namespaces/{namespaceName}
          description: "Manage a specific namespace"
          operations:
            - name: get-namespace
              method: GET
              description: "Get namespace details"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: namespaceName
                  in: path
                  type: string
                  required: true
                  description: "Namespace name"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-or-update-namespace
              method: PUT
              description: "Create or update a namespace"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: namespaceName
                  in: path
                  type: string
                  required: true
                  description: "Namespace name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-namespace
              method: DELETE
              description: "Delete a namespace"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: namespaceName
                  in: path
                  type: string
                  required: true
                  description: "Namespace name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: queues
          path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ServiceBus/namespaces/{namespaceName}/queues
          description: "Service Bus queues"
          operations:
            - name: list-queues
              method: GET
              description: "List queues in a namespace"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: namespaceName
                  in: path
                  type: string
                  required: true
                  description: "Namespace name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: topics
          path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ServiceBus/namespaces/{namespaceName}/topics
          description: "Service Bus topics"
          operations:
            - name: list-topics
              method: GET
              description: "List topics in a namespace"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: namespaceName
                  in: path
                  type: string
                  required: true
                  description: "Namespace name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: service-bus-api
      resources:
        - path: /v1/namespaces
          name: namespaces
          description: "Service Bus namespaces"
          operations:
            - method: GET
              name: list-namespaces
              description: "List namespaces"
              call: "service-bus.list-namespaces"

    - type: mcp
      port: 9100
      namespace: service-bus-mcp
      transport: http
      tools:
        - name: list-namespaces
          description: "List Service Bus namespaces"
          hints:
            readOnly: true
          call: "service-bus.list-namespaces"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-namespace
          description: "Get namespace details"
          hints:
            readOnly: true
          call: "service-bus.get-namespace"
          with:
            subscriptionId: "tools.subscriptionId"
            resourceGroupName: "tools.resourceGroupName"
            namespaceName: "tools.namespaceName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-queues
          description: "List queues in a namespace"
          hints:
            readOnly: true
          call: "service-bus.list-queues"
          with:
            subscriptionId: "tools.subscriptionId"
            resourceGroupName: "tools.resourceGroupName"
            namespaceName: "tools.namespaceName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-topics
          description: "List topics in a namespace"
          hints:
            readOnly: true
          call: "service-bus.list-topics"
          with:
            subscriptionId: "tools.subscriptionId"
            resourceGroupName: "tools.resourceGroupName"
            namespaceName: "tools.namespaceName"
          outputParameters:
            - type: object
              mapping: "$."
