$schema: https://json-schema.org/draft/2020-12/schema
$id: azure-service-bus-queue
title: Azure Service Bus Queue
description: A Service Bus queue resource with its properties.
type: object
properties:
  id:
    type: string
    readOnly: true
    description: Fully qualified resource ID.
  name:
    type: string
    readOnly: true
    description: Resource name.
  type:
    type: string
    readOnly: true
    description: Resource type.
  properties:
    type: object
    properties:
      lockDuration:
        type: string
        description: Lock duration timespan (ISO 8601 format, e.g., PT1M for 1 minute).
      maxSizeInMegabytes:
        type: integer
        description: Maximum size of the queue in megabytes.
      requiresDuplicateDetection:
        type: boolean
        description: Whether duplicate detection is enabled.
      requiresSession:
        type: boolean
        description: Whether sessions are required.
      defaultMessageTimeToLive:
        type: string
        description: Default message TTL (ISO 8601 duration).
      deadLetteringOnMessageExpiration:
        type: boolean
        description: Whether to dead-letter expired messages.
      duplicateDetectionHistoryTimeWindow:
        type: string
        description: Duplicate detection history time window (ISO 8601).
      maxDeliveryCount:
        type: integer
        description: Maximum delivery count before dead-lettering.
      status:
        type: string
        enum:
          - Active
          - Disabled
          - SendDisabled
          - ReceiveDisabled
      enableBatchedOperations:
        type: boolean
      autoDeleteOnIdle:
        type: string
        description: Auto-delete idle duration (ISO 8601).
      enablePartitioning:
        type: boolean
      enableExpress:
        type: boolean
      forwardTo:
        type: string
        description: Queue or topic name to forward messages to.
      forwardDeadLetteredMessagesTo:
        type: string
      messageCount:
        type: integer
        format: int64
        readOnly: true
      sizeInBytes:
        type: integer
        format: int64
        readOnly: true
